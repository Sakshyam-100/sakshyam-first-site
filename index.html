<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakshyam Ghimire | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- MODERN RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #0f0f0f; /* Sleek dark background */
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                              url('https://images.alphacoders.com/941/941011.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: #eeeeee;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        /* --- CLOCK STICKER --- */
        #myClock {
            color: #ffcc00; 
            background: rgba(220, 20, 60, 0.2); 
            display: inline-block;
            padding: 10px 25px;
            border: 2px solid #ffcc00;
            border-radius: 15px;
            font-family: 'Courier New', monospace;
            font-size: 40px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }

        /* --- SECTIONS --- */
        .section-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            margin: 20px auto;
            width: 90%;
            max-width: 800px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .btn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 204, 0, 0.4); }

        /* --- AVATAR --- */
        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid #ffcc00;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }

        /* --- GALLERY & CARDS --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 10px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card:hover { transform: scale(1.05); border-color: #ffcc00; }
        .card img { width: 100%; border-radius: 10px; }
        .card p { margin-top: 8px; font-weight: 600; font-size: 14px; }

        /* --- NEPAL FLAG --- */
        .flag { position: fixed; bottom: 20px; right: 20px; width: 40px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    </style>
</head>
<body>

    <audio id="vipSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

    <header style="padding: 40px 20px;">
        <img src="https://wallpapercave.com/wp/wp5940428.jpg" class="profile-pic" alt="Chrollo">
        <h1 id="greetText" style="font-family: 'Kalam'; font-size: 45px;">Namaste!</h1>
        <p>I'm <b>Sakshyam Ghimire</b> (15) | Web Dev from Nepal 🇳🇵</p>
        <h2 id="myClock">00:00:00</h2>
    </header>

    <div class="section-box">
        <h2 style="color: #ffcc00; margin-bottom: 15px;">Jadu Ghar ✨</h2>
        <button class="btn" onclick="let n = prompt('Who are you?'); if(n) alert('Namaste ' + n + '! Welcome to my world.');">Sodha Malai</button>
        <button class="btn" onclick="showVips()" style="background: #dc143c; color: white;">Show VIPs 👑</button>
        
        <div id="vipList" style="display:none; margin-top: 15px;">
            <p>🔥 Sakshyam | Soyesh | Motka | Mikesh | Simran 🔥</p>
        </div>
    </div>

    <div class="section-box">
        <h2 style="color: #ff4500;">🔥 THE NEW LEGENDS 🔥</h2>
        <div class="grid-container">
            <div class="card">
                <img src="https://i.pinimg.com/originals/1f/60/42/1f6042531438992c4605151e3678082f.jpg">
                <p>Eren Yeager</p>
            </div>
            <div class="card">
                <img src="https://i.pinimg.com/originals/ee/13/96/ee139626394142f9f95701d4a8e0e01c.jpg">
                <p>Monkey D. Luffy</p>
            </div>
            <div class="card">
                <img src="https://i.pinimg.com/originals/60/3d/8c/603d8c199583b32085750058b1464b5e.jpg">
                <p>Nagi Seishiro</p>
            </div>
        </div>
    </div>

    <div class="section-box">
        <h2 style="color: #00acee;">Mero Nepal Gallery 🏔️</h2>
        <div class="grid-container">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1544735716-392fe2489ffa?w=400">
                <p>Mt. Everest</p>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1582650839019-746eb97ec394?w=400">
                <p>Phewa Lake</p>
            </div>
        </div>
    </div>

    <div class="section-box" style="border: 1px solid #E1306C;">
        <h3>Contact Sakshyam</h3>
        <p style="font-size: 14px; opacity: 0.8; margin: 10px 0;">Instagram: @sakshyam.san</p>
        <button class="btn" style="background: #E1306C; color: white;" onclick="location.href='tel:9824955188'">Call Me</button>
    </div>

    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9b/Flag_of_Nepal.svg" class="flag">

    <script>
        // Real-time Clock & Greeting
        function updateAll() {
            let now = new Date();
            document.getElementById('myClock').innerHTML = now.toLocaleTimeString();
            let hour = now.getHours();
            let greet = document.getElementById('greetText');
            if (hour < 12) greet.innerHTML = "Subha Prabhat!";
            else if (hour < 18) greet.innerHTML = "Subha Din!";
            else greet.innerHTML = "Subha Ratri!";
        }
        setInterval(updateAll, 1000);
        updateAll();

        function showVips() {
            document.getElementById('vipSound').play();
            let list = document.getElementById('vipList');
            list.style.display = (list.style.display === 'none') ? 'block' : 'none';
        }
    </script>
</body>
</html>
