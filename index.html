<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakshyam OS | Neural Paradise</title>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Orbitron:wght@500&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --glass: rgba(255, 255, 255, 0.1); --neon-blue: #00f2ff; --neon-pink: #ff00ff; --danger: #ff4444; }
        
        body { 
            /* Background dark overlay + bleach.jpg */
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('bleach.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }

        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: -1; display: none; opacity: 0.3; pointer-events: none; }

        .nepal-flag { position: fixed; top: 20px; left: 20px; width: 40px; z-index: 1000; animation: float 3s ease-in-out infinite; }
        .music-disk { position: fixed; top: 20px; left: 80px; width: 45px; height: 45px; z-index: 1000; background: radial-gradient(circle, #333 20%, #000 100%); border-radius: 50%; border: 2px solid var(--gold); animation: spin 4s linear infinite; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .disk-center { width: 12px; height: 12px; background: var(--gold); border-radius: 50%; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(1px, 1px); } }

        .jadu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 10; }
        .magic-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 25px; transition: 0.4s; }
        .magic-card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 0 20px var(--gold); }
        /* Original button styles restored */
        .btn { background: white; color: black; border: none; padding: 12px 20px; border-radius: 50px; font-family: 'Kalam'; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; text-decoration: none; display: block; text-align: center; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 12px 30px; border-radius: 50px; font-weight: bold; transition: 0.5s; z-index: 9999; }
    </style>
</head>
<body onclick="initAudio()">
    <audio id="mainAudio" loop><source src="main.mp3" type="audio/mpeg"></audio>
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9b/Flag_of_Nepal.svg" class="nepal-flag" alt="Nepal">
    <div class="music-disk" onclick="toggleMusic()"><div class="disk-center"></div></div>
    <canvas id="matrixCanvas"></canvas>
    <div id="toast">CORE ONLINE</div>

    <header style="padding: 50px 20px 20px; text-align: center;">
        <h1 style="font-family: 'Kalam'; font-size: 50px; color: var(--gold); margin: 0;">Sakshyam Paradise</h1>
        <div id="clock" style="font-family: 'Orbitron'; font-size: 30px; opacity: 0.8; color: var(--neon-blue);">00:00:00</div>
    </header>

    <div class="jadu-grid">
        <div class="magic-card" style="border-top: 4px solid var(--gold);">
            <h2 style="font-family: 'Kalam';">System Control</h2>
            <button class="btn" style="background: #111; color: var(--neon-blue);" onclick="toggleMatrix()">MATRIX MODE</button>
            <button class="btn" style="background: var(--danger); color: white;" onclick="selfDestruct()">OVERLOAD SYSTEM</button>
        </div>

        <div class="magic-card">
            <h2 style="color: #00acee; font-family: 'Kalam';">Weather Monitor</h2>
            <div id="temp" style="font-size: 28px; font-weight: bold;">Loading...</div>
            <p style="font-size: 12px;">Baniyani, Jhapa</p>
        </div>

        <div class="magic-card" style="border-top: 4px solid var(--neon-pink);">
            <h3 style="color: var(--neon-pink); font-family: 'Orbitron';">Gaming Zone</h3>
            <p id="scoreDisplay" style="font-size: 20px; font-weight: bold;">Score: 0</p>
            <div id="passReveal" style="color: lime; font-weight: bold; height: 20px;"></div>
            <button class="btn" onclick="addScore()">TAP ATTACK</button>
        </div>

        <div class="magic-card" style="border-top: 4px solid #ff00ff;">
            <h2 style="color: #ff00ff; font-family: 'Kalam';">Anime Vault</h2>
            <button class="btn" style="background: #ff00ff; color: white;" onclick="location.href='animelist.html'">OPEN MY LIST</button>
        </div>

        <div class="magic-card" style="border-top: 4px solid var(--gold);">
            <h2 style="color: var(--gold); font-family: 'Kalam';">Portals</h2>
            <button class="btn" style="background: #222; color: var(--gold);" onclick="location.href='noble.html'">READ NOBLE</button>
            <button class="btn" style="background: var(--gold); color: black;" onclick="enterPortal()">ENTER SECRET LAB</button>
        </div>

        <div class="magic-card" style="grid-column: 1 / -1; border-left: 5px solid var(--gold);">
            <h2 style="color: var(--gold); font-family: 'Kalam';">Contact the Legend</h2>
            <div style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
                <a href="https://instagram.com/sakshyam.san" target="_blank" class="btn" style="background: #E1306C; color: white; flex: 1; min-width: 200px;">Instagram</a>
                <a href="mailto:sakshyamghimire525@gamil.com" class="btn" style="background: #111; color: var(--gold); border: 1px solid var(--gold); flex: 1; min-width: 200px;">Email</a>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('mainAudio');
        let mInterval;
        function initAudio() { if(audio.paused) audio.play(); }
        function toggleMusic() { event.stopPropagation(); (audio.paused) ? audio.play() : audio.pause(); notify("MUSIC UPDATED"); }

        async function getWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=26.4714&longitude=88.1066&current_weather=true`);
                const data = await res.json();
                document.getElementById('temp').innerText = `${data.current_weather.temperature}°C | Jhapa`;
            } catch (e) { document.getElementById('temp').innerText = "Offline"; }
        }
        getWeather();

        let score = 0, hasWon = false;
        function addScore() { 
            score++; document.getElementById('scoreDisplay').innerText = "Score: " + score; 
            if(score === 50) { hasWon = true; document.getElementById('passReveal').innerText = "KEY: 1234"; notify("LAB UNLOCKED"); }
        }
        function enterPortal() {
            if(!hasWon) return alert("Score 50 first!");
            if (prompt("Key?") === "1234") location.href = "jadu.html";
        }

        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        function toggleMatrix() {
            if (canvas.style.display === 'block') { canvas.style.display = 'none'; clearInterval(mInterval); }
            else { canvas.style.display = 'block'; setupMatrix(); }
        }
        function setupMatrix() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const drops = Array(Math.floor(canvas.width/16)).fill(1);
            mInterval = setInterval(() => {
                ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#0f0"; drops.forEach((y, i) => {
                    ctx.fillText("10"[Math.floor(Math.random()*2)], i*16, y*16);
                    if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }, 33);
        }

        function selfDestruct() {
            document.body.style.animation = "shake 0.1s infinite";
            notify("CRITICAL OVERLOAD");
            audio.pause();
            setTimeout(() => {
                if (mInterval) clearInterval(mInterval);
                document.body.style.animation = "none";
                document.body.style.background = "black";
                document.body.innerHTML = `
                    <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#ff0000; font-family:'Orbitron'; text-align:center;">
                        <h1 style="font-size:60px;">CORE CRASHED</h1>
                        <p style="color:#444;">System Integrity Compromised.</p>
                        <button onclick="location.reload()" style="background:transparent; border:1px solid #333; color:#333; padding:12px 30px; cursor:pointer; margin-top:30px; border-radius:50px; font-family:'Poppins';">REBOOT SYSTEM</button>
                    </div>
                `;
            }, 3000);
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        function notify(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.top = "20px"; setTimeout(() => t.style.top = "-100px", 2000); }
    </script>
</body>
</html>
