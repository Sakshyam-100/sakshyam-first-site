<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sakshyam OS | Jadu Ghar Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --hero: #00f2ff; --boss: #ff0033; --glass: rgba(0, 0, 0, 0.85); }
        
        body { 
            background: url('bleach.jpg') center/cover no-repeat fixed; 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            touch-action: none; 
            overflow: hidden; 
            height: 100vh; 
        }
        
        .ui-top { position: absolute; width: 100%; top: 15px; display: flex; justify-content: space-around; z-index: 100; background: rgba(0,0,0,0.7); padding: 8px 0; border-bottom: 1px solid var(--gold); }
        .hp-group { width: 42%; display: flex; flex-direction: column; align-items: center; }
        .hp-label { font-size: 0.55rem; margin-bottom: 4px; color: var(--gold); letter-spacing: 1px; text-shadow: 0 0 5px black; }
        .hp-box { width: 100%; height: 12px; background: #111; border: 1px solid #444; border-radius: 2px; }
        .fill { height: 100%; transition: width 0.2s ease; }

        .arena {
            height: 50vh; width: 94%; margin: 85px auto 10px; border: 2px solid #555; border-radius: 12px;
            background: url('soul_society.jpg') center/cover no-repeat;
            position: relative; overflow: hidden; box-shadow: 0 0 25px rgba(0,0,0,0.8);
        }
        .barrier { position: absolute; left: 40%; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.15); border-left: 1px dashed rgba(255,255,255,0.3); }

        #hero { width: 55px; height: 55px; position: absolute; background: url('ichigo_cursor.png') center/contain no-repeat; z-index: 50; display: none; filter: drop-shadow(0 0 5px var(--hero)); }
        #boss { width: 80px; height: 80px; position: absolute; right: 15px; top: 40%; background: url('boss.png') center/contain no-repeat; z-index: 40; display: none; transition: top 0.6s ease-in-out; }

        .boss-beam { position: absolute; height: 8px; width: 38px; background: var(--boss); box-shadow: 0 0 12px red; border-radius: 4px; }
        .hero-beam { position: absolute; height: 12px; width: 60px; background: var(--hero); box-shadow: 0 0 20px var(--hero); border-radius: 6px; }

        #controls { display: none; position: fixed; bottom: 35px; width: 100%; justify-content: space-between; padding: 0 25px; box-sizing: border-box; align-items: center; z-index: 90; }
        #joy-base { width: 100px; height: 100px; background: rgba(0,0,0,0.5); border-radius: 50%; border: 2px solid var(--gold); position: relative; }
        #joy-knob { width: 38px; height: 38px; background: var(--gold); border-radius: 50%; position: absolute; left: 31px; top: 31px; box-shadow: 0 0 15px var(--gold); }

        #atk-btn { 
            width: 90px; height: 90px; border-radius: 50%; background: rgba(0,0,0,0.8); 
            border: 3px solid var(--hero); color: var(--hero); position: relative;
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-family: 'Orbitron';
        }
        #atk-count { position: absolute; top: -8px; right: -8px; background: var(--gold); color: black; padding: 3px 9px; border-radius: 10px; font-size: 0.85rem; font-weight: bold; }
        
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; z-index: 10; }
        .m-btn { background: rgba(0,0,0,0.85); border: 1px solid var(--gold); color: white; padding: 22px; border-radius: 10px; font-family: 'Orbitron'; font-size: 0.75rem; }

        /* ENGINE BAR */
        .engine-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: center; gap: 2px; z-index: 210; }
        .bar-btn { background: var(--gold); color: black; border: none; padding: 6px 15px; font-family: 'Orbitron'; font-size: 9px; font-weight: bold; cursor: pointer; border-radius: 5px 5px 0 0; }
        .copy-btn { background: #222; color: var(--gold); border: 1px solid var(--gold); }

        .executor-drawer { 
            position: fixed; bottom: -400px; left: 0; width: 100%; height: 350px; 
            background: var(--glass); border-top: 2px solid var(--gold); 
            transition: bottom 0.4s ease; z-index: 200; padding: 20px; box-sizing: border-box;
        }
        .executor-drawer.open { bottom: 0; }
        #gameCodeInput { width: 100%; height: 150px; background: #111; color: #00ff00; border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: monospace; resize: none; box-sizing: border-box; }
    </style>
</head>
<body onclick="document.getElementById('bgm').play()">
    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div class="ui-top">
        <div class="hp-group">
            <div class="hp-label">BOSS REIRYOKU</div>
            <div class="hp-box"><div id="hp-boss" class="fill" style="background:var(--boss); width:100%;"></div></div>
        </div>
        <div class="hp-group">
            <div class="hp-label">ICHIGO SPIRIT</div>
            <div class="hp-box"><div id="hp-hero" class="fill" style="background:var(--hero); width:100%;"></div></div>
        </div>
    </div>

    <div class="arena" id="arena">
        <div class="barrier"></div>
        <div id="hero"></div>
        <div id="boss"></div>
    </div>

    <div id="menu-ui" class="menu">
        <button class="m-btn" onclick="start('dodge')">DODGE FLASH</button>
        <button class="m-btn" onclick="start('boss')">BOSS FIGHT</button>
    </div>

    <div id="controls">
        <div id="joy-base"><div id="joy-knob"></div></div>
        <button id="atk-btn" onclick="fire()">GETSUGA<div id="atk-count">0</div></button>
    </div>

    <div class="engine-bar">
        <button class="bar-btn" onclick="toggleEngine()">OPEN ENGINE</button>
        <button class="bar-btn copy-btn" onclick="copyLegendaryCode()">COPY LEGEND</button>
    </div>

    <div id="executor" class="executor-drawer">
        <h3 style="margin: 0 0 10px; color: var(--gold); font-size: 0.8rem; text-align: center;">LEGENDARY CODE INJECTOR</h3>
        <textarea id="gameCodeInput" placeholder="Paste code here..."></textarea>
        <button onclick="runExternalCode()" style="width: 100%; background: var(--gold); border: none; padding: 12px; margin-top: 10px; font-family: 'Orbitron'; font-weight: bold;">INJECT & RUN</button>
        <button onclick="toggleEngine()" style="width: 100%; background: transparent; border: 1px solid white; color: white; padding: 8px; margin-top: 5px; font-family: 'Orbitron'; font-size: 10px;">CLOSE</button>
    </div>

    <script>
        let hp_h=100, hp_b=100, stock=0, mode=null, active=false;
        let px=40, py=100, jx=0, jy=0;
        const hero = document.getElementById('hero'), boss = document.getElementById('boss');
        const arena = document.getElementById('arena'), joy = document.getElementById('joy-base');

        function toggleEngine() { document.getElementById('executor').classList.toggle('open'); }

        function copyLegendaryCode() {
            const legendCode = `<!DOCTYPE html><html><body style="margin:0;background:#000;overflow:hidden;color:cyan;font-family:sans-serif;text-align:center;"><canvas id="g"></canvas><script>const c=document.getElementById("g"),x=c.getContext("2d");let w,h,p={x:0,y:0},s=0,e=[],t=0;function res(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;p.x=w/2;p.y=h/2}window.onresize=res;res();c.ontouchmove=v=>{p.x=v.touches[0].clientX;p.y=v.touches[0].clientY};function spawn(){e.push({x:Math.random()*w,y:-20,s:2+Math.random()*5,t:Math.random()>0.8?"p":"h"})}function loop(){x.fillStyle="rgba(0,0,0,0.2)";x.fillRect(0,0,w,h);t++;if(t%20==0)spawn();x.fillStyle="cyan";x.beginPath();x.arc(p.x,p.y,15,0,7);x.fill();e.forEach((o,i)=>{o.y+=o.s;x.fillStyle=o.t=="p"?"#fff":"#f00";x.fillRect(o.x,o.y,10,10);if(Math.hypot(o.x-p.x,o.y-p.y)<25){if(o.t=="p")s+=10;else s-=20;e.splice(i,1)}if(o.y>h)e.splice(i,1)});x.fillStyle="#fff";x.fillText("PURIFICATION SCORE: "+s,20,30);requestAnimationFrame(loop)}loop()<\/script></body></html>`;
            navigator.clipboard.writeText(legendCode).then(() => alert("LEGENDARY CODE COPIED!"));
        }

        function runExternalCode() {
            const code = document.getElementById('gameCodeInput').value;
            if(!code.trim()) return alert("Paste code first!");
            toggleEngine();
            active = false; 
            document.getElementById('controls').style.display = 'none';
            arena.innerHTML = ""; 
            const iframe = document.createElement('iframe');
            iframe.style.width = "100%"; iframe.style.height = "100%"; iframe.style.border = "none";
            arena.appendChild(iframe);
            const doc = iframe.contentWindow.document;
            doc.open(); doc.write(code); doc.close();
            const exit = document.createElement('button');
            exit.innerText = "EXIT"; exit.style.cssText = "position:absolute;top:5px;right:5px;z-index:999;background:red;color:white;border:none;font-family:Orbitron;padding:5px;";
            exit.onclick = () => location.reload();
            arena.appendChild(exit);
        }

        joy.addEventListener('touchmove', (e) => {
            const r = joy.getBoundingClientRect();
            const t = e.touches[0];
            let dx = t.clientX - (r.left + 50), dy = t.clientY - (r.top + 50);
            let d = Math.min(Math.hypot(dx, dy), 50), a = Math.atan2(dy, dx);
            document.getElementById('joy-knob').style.left = (31 + Math.cos(a)*d*0.6)+"px";
            document.getElementById('joy-knob').style.top = (31 + Math.sin(a)*d*0.6)+"px";
            jx = (Math.cos(a)*d)/17; jy = (Math.sin(a)*d)/17;
        });

        document.addEventListener('touchend', () => { jx=0; jy=0; document.getElementById('joy-knob').style.left="31px"; document.getElementById('joy-knob').style.top="31px"; });

        function frame() {
            if(active) {
                px += jx * 4; py += jy * 4;
                let wall = arena.offsetWidth * 0.4 - 55;
                if(px < 0) px = 0; if(px > wall) px = wall;
                if(py < 0) py = 0; if(py > arena.offsetHeight - 55) py = arena.offsetHeight - 55;
                hero.style.left = px+"px"; hero.style.top = py+"px";
            }
            requestAnimationFrame(frame);
        }
        frame();

        function start(m) {
            mode = m; active = true; hp_h=100; hp_b=100; stock=0; refresh();
            document.getElementById('menu-ui').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            hero.style.display = 'block';
            if(m === 'boss') { boss.style.display = 'block'; bossAttack(); document.getElementById('atk-btn').style.visibility = 'visible'; } 
            else { document.getElementById('atk-btn').style.visibility = 'hidden'; spawnFlash(); }
        }

        function bossAttack() {
            if(!active || mode !== 'boss') return;
            boss.style.top = Math.random() * (arena.offsetHeight - 80) + "px";
            const b = document.createElement('div');
            b.className = 'boss-beam';
            b.style.right = "90px"; b.style.top = (boss.offsetTop + 36) + "px";
            arena.appendChild(b);
            let bx = arena.offsetWidth - 90;
            const bIv = setInterval(() => {
                bx -= 8.5; b.style.left = bx + "px";
                if(hit(hero, b)) { hp_h -= 10; refresh(); b.remove(); clearInterval(bIv); }
                if(bx < -40) { stock++; refresh(); b.remove(); clearInterval(bIv); }
            }, 20);
            setTimeout(bossAttack, 1350);
        }

        function fire() {
            if(stock <= 0) return;
            stock--; refresh();
            const beam = document.createElement('div');
            beam.className = 'hero-beam';
            beam.style.left = (px + 55) + "px"; beam.style.top = (py + 20) + "px";
            arena.appendChild(beam);
            let ax = px + 55;
            const aIv = setInterval(() => {
                ax += 14.5; beam.style.left = ax + "px";
                if(hit(boss, beam)) { hp_b -= 15; refresh(); beam.remove(); clearInterval(aIv); }
                if(ax > arena.offsetWidth) { beam.remove(); clearInterval(aIv); }
            }, 20);
        }

        function spawnFlash() {
            if(!active || mode !== 'dodge') return;
            const f = document.createElement('div');
            f.className = 'boss-beam'; f.style.left = arena.offsetWidth + "px"; 
            f.style.top = Math.random() * (arena.offsetHeight - 15) + "px";
            arena.appendChild(f);
            let fx = arena.offsetWidth;
            const fIv = setInterval(() => {
                fx -= 8.2; f.style.left = fx + "px";
                if(hit(hero, f)) { hp_h -= 25; refresh(); f.remove(); clearInterval(fIv); }
                if(fx < -40) { f.remove(); clearInterval(fIv); }
            }, 20);
            setTimeout(spawnFlash, 1050);
        }

        function hit(a, b) {
            let r1 = a.getBoundingClientRect(), r2 = b.getBoundingClientRect();
            return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
        }

        function refresh() {
            document.getElementById('hp-hero').style.width = hp_h + "%";
            document.getElementById('hp-boss').style.width = hp_b + "%";
            document.getElementById('atk-count').innerText = stock;
            if(hp_h <= 0 || hp_b <= 0) { active = false; alert(hp_h <= 0 ? "LOSER" : "VICTORY"); location.reload(); }
        }
    </script>
</body>
</html>
