<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noble Library | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Orbitron:wght@500&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('bleach.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Kalam';
            font-size: 60px;
            color: #d4af37; /* Gold */
            margin: 0;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        p {
            font-family: 'Orbitron';
            font-size: 20px;
            letter-spacing: 5px;
            color: #00f2ff; /* Neon Blue */
            margin-top: 10px;
            text-transform: uppercase;
        }

        .back-btn {
            margin-top: 30px;
            background: white;
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-family: 'Kalam';
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Noble Vault</h1>
        <p>Coming Soon...</p>
        <a href="index.html" class="back-btn">Return to Paradise</a>
    </div>

</body>
</html>
